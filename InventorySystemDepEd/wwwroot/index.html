    <style>
        /* Fullscreen overlay */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: Arial, sans-serif;
        }

        /* Spinner */
        .spinner {
            width: 3rem;
            height: 3rem;
            border: 4px solid #e5e7eb;
            border-top-color: rgb(5, 39, 103);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Loading percentage text */
        .loading-text {
            font-weight: 700;
            color: rgb(5, 39, 103);
            font-size: 1.2rem;
        }

            /* Slightly thinner at 100% */
            .loading-text.full {
                font-weight: 500; /* thinner when full */
                color: rgb(5, 39, 103);
            }
    </style>
